name: deploy-server

# main push 시 GHCR 이미지 빌드/푸시 → OIDC az login → Azure Container Apps 갱신.
# 절차·리소스 생성: docs 가이드/azure/배포.md (ADR-0018). 시크릿은 ACA secret 으로 런타임 주입(이미지 미포함).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/ieoseo/server
  RESOURCE_GROUP: ieoseo-rg
  CONTAINER_APP: ieoseo-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Azure secrets
        id: gate
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AZURE_* secrets 미설정 — 배포 스텝 skip(빌드/푸시만). 설정: docs 가이드/azure/배포.md"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Azure login (OIDC)
        if: steps.gate.outputs.ready == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        if: steps.gate.outputs.ready == 'true'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              -n "${{ env.CONTAINER_APP }}" -g "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.IMAGE }}:${{ github.sha }}"
