# server 컨테이너 이미지 빌드 → GHCR(GitHub Container Registry, 무료) 푸시.
# Azure App Service for Containers 가 이 이미지를 pull 한다.
# 자격증명: GITHUB_TOKEN(자동) — 별도 시크릿 불필요. 최초 1회 GHCR 패키지를 public 으로 전환.
name: deploy-server

on:
  push:
    branches: [main]
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR 푸시 권한
    # publish profile secret 이 있으면 빌드 후 App Service 가 새 이미지를 pull 하도록 배포한다.
    # 없으면 배포 스텝은 건너뛴다(GHCR push 까지만 — 포털 재시작으로 수동 갱신).
    env:
      HAS_AZURE_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ieoseo-server:latest
            ghcr.io/${{ github.repository_owner }}/ieoseo-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GHCR 의 방금 그 이미지(:sha 고정)를 App Service 가 pull 하도록 배포.
      # :sha 로 고정해야 어떤 커밋이 떴는지 추적되고 캐시 혼동이 없다.
      # 필요 secret: AZURE_WEBAPP_PUBLISH_PROFILE (포털 → App Service → 게시 프로필 가져오기).
      - name: Deploy to Azure App Service
        if: ${{ env.HAS_AZURE_PROFILE == 'true' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ieoseo-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ghcr.io/${{ github.repository_owner }}/ieoseo-server:${{ github.sha }}
