# 이어서 로컬 개발용 PostgreSQL. 실행법·설명: ../docs/가이드/서버-로컬-테스트.md
services:
  db:
    image: postgres:16-alpine
    container_name: ieoseo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?}
      POSTGRES_USER: ${DB_USERNAME:?}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
    ports:
      - "${DB_PORT:?}:5432"
    volumes:
      - ieoseo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ieoseo-pgdata:
