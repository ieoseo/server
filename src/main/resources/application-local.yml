# 로컬 개발 프로파일 (./gradlew bootRun → spring.profiles.active=local).
# 보안/환경값은 server/.env.local 에서 주입한다(파일 없으면 OS 환경변수). 하드코딩 없음.
# 최초: cp .env.example .env.local 후 값 채움. 값 예시는 docs/가이드/환경변수.md 참조.
spring:
  config:
    import: "optional:file:.env.local[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# 로컬은 진단을 위해 상세 로깅(인증·외부연동·요청 흐름).
logging:
  level:
    app.ieoseo.server: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
