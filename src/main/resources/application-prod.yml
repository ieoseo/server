# 배포(운영) 프로파일 (SPRING_PROFILES_ACTIVE=prod — 컨테이너 기본).
# 실제 값은 이 파일에 두지 않는다 — server/.env.prod 또는 배포 OS 환경변수로 주입한다.
# 인증 jwk-set-uri 는 공통(application.yml)이 ${SUPABASE_JWKS_URI} 를 읽는다 — prod 는 필수.
spring:
  config:
    import: "optional:file:.env.prod[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # Supabase 커넥션 풀러(session mode)는 클라이언트 15개 한도. 리비전 무중단 교체 시
    # 구/신 리비전이 잠깐 공존하므로 리비전당 커넥션을 낮게 잡아 한도를 넘지 않게 한다.
    # (기본값은 max=idle=10 → 리비전 2개면 20 > 15 로 EMAXCONNSESSION 발생.)
    # 상세: docs/가이드/azure/배포.md, docs/02-아키텍처/기술스택.md.
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

# API 문서(OpenAPI/Swagger UI)는 운영에서 비활성 — 공개 엔드포인트 정보노출 최소화(local 에선 활성).
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 운영 로그(Azure Log Stream/콘솔). 도메인은 INFO, 보안/요청은 과다 로그 방지로 WARN.
# LOG_LEVEL_APP 환경변수로 일시 상향(예: DEBUG) 가능.
logging:
  level:
    app.ieoseo.server: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: WARN
    org.springframework.web: WARN
