spring:
  application:
    name: server
  # 보안/환경값은 프로파일별 env 파일로 주입한다: local=.env.local, prod=.env.prod
  # (각 application-{profile}.yml 의 spring.config.import). CI/운영은 OS 환경변수가 우선.
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  # Supabase Auth(Resource Server) — JWKS 로 JWT 검증(ADR-0014). 값은 ${SUPABASE_JWKS_URI} 로 주입한다.
  # local 은 .env.local, prod 는 .env.prod/OS 환경변수. test 는 application-test.yml 의 더미가 덮어쓴다.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWKS_URI:}

server:
  port: 8080

# 로그 가시성(프로파일별 레벨은 application-{local,prod}.yml 에서 덮어쓴다).
# 운영/로컬에서 요청·인증·외부연동 흐름을 추적하기 위한 기본 설정.
logging:
  level:
    root: INFO
    app.ieoseo.server: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{32} - %msg%n"

# 이어서 도메인 정책·스케줄 — 환경 무관 상수.
ieoseo:
  # 하루 최대 예약 시간(분) 기본값. 단일 출처(SSOT)는 여기/FRD.
  # 동일 기본값이 settings/domain/UserSettings.kt(DEFAULT_MAX_DAILY_MINUTES) 와
  # db/migration/V4__user_settings.sql(DEFAULT 480) 에도 있으니 함께 맞춘다.
  max-daily-minutes: 480
  schedule:
    debt-generation: "0 5 0 * * *"
    recurrence-expansion: "0 10 0 * * *"
    recurrence-horizon-days: 14
    notifications: "0 0 9 * * *"
  # Google Calendar OAuth(서버 주도, 이슈 #9). 시크릿은 env 로 주입(미설정 시 연동 비활성).
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:}
    return-deeplink: ${GOOGLE_CALENDAR_RETURN_DEEPLINK:app.ieoseo://calendar-callback}
  # 외부 캘린더 연동 설정.
  calendar:
    # 연동 토큰(access/refresh) 컬럼 암호화 키. base64 인코딩한 32바이트(AES-256).
    # 미설정 시 평문 폴백(로컬/CI 편의) — 운영은 반드시 주입한다(ADR-0025, B-1).
    token-encryption-key: ${CALENDAR_TOKEN_ENC_KEY:}
    notion:
      # Notion API 버전(날짜 고정). 시간이 지나면 갱신 — 환경변수 NOTION_API_VERSION 로 덮어쓸 수 있다.
      api-version: ${NOTION_API_VERSION:2022-06-28}
