spring:
  application:
    name: server
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

# 이어서 도메인 정책·스케줄 — 환경 무관 상수.
ieoseo:
  max-daily-minutes: 480
  schedule:
    debt-generation: "0 5 0 * * *"
    recurrence-expansion: "0 10 0 * * *"
    recurrence-horizon-days: 14
    notifications: "0 0 9 * * *"
